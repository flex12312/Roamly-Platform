services:
  postgres:
    image: postgres:15
    container_name: roamly_postgres
    environment:
      POSTGRES_DB: roamly_identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: flex123
    ports:
      - "5432:5432"
    volumes:
      - postgres_:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - roamly-network

  redis:
    image: redis:7
    container_name: roamly_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_:/data
    networks:
      - roamly-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: roamly_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - roamly-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: roamly_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - roamly-network
      
  identity-api:
    build:
      context: ./Roamly.Identity.Api   
      dockerfile: Dockerfile   
      args:
        - BUILD_CONFIGURATION=Release
    container_name: roamly_identity_api
    ports:
      - "7098:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__IdentityDbConnection=Host=postgres;Port=5432;Database=roamly_identity_db;Username=postgres;Password=flex123
      - Redis__Host=redis
      - Redis__Port=6379
      - JwtSettings__SecretKey=ThisIsMyVerySecretKeyForRoamlyProject2026!!!
      - JwtSettings__Issuer=Roamly.Identity.Api
      - JwtSettings__Audience=Roamly.Clients
      - JwtSettings__ExpiryMinutes=30
      - AdminSettings__Email=admin@roamly.com
      - AdminSettings__Password=TempPass123!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - roamly-network
    restart: unless-stopped

  housing-api:
    build:
      context: ./Roamly.Housing.Api    
      dockerfile: Dockerfile
      args:
        - BUILD_CONFIGURATION=Release
    container_name: roamly_housing_api
    ports:
      - "7099:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__HousingDbConnection=Host=postgres;Port=5432;Database=roamly_housing_db;Username=postgres;Password=flex123
      - Redis__Host=redis
      - Redis__Port=6379
      - Kafka__BootstrapServers=kafka:9092
      - JwtSettings__SecretKey=ThisIsMyVerySecretKeyForRoamlyProject2026!!!
      - JwtSettings__Issuer=Roamly.Identity.Api
      - JwtSettings__Audience=Roamly.Clients
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - roamly-network
    restart: unless-stopped

  search-api:                                     
    build:
      context: .
      dockerfile: Roamly.Search.Api/Dockerfile
      args:
        - BUILD_CONFIGURATION=Release
    container_name: roamly_search_api
    ports:
      - "7100:8080"                              
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__SearchDbConnection=Host=postgres;Port=5432;Database=roamly_housing_db;Username=postgres;Password=flex123
      - Redis__Host=redis
      - Redis__Port=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - roamly-network
    restart: unless-stopped
    
networks:
  roamly-network:
    driver: bridge

volumes:
  postgres_:
  redis_:
  zookeeper_:
  kafka_: